<head>
    <script>
        (function () {
            try {
                var isDark = localStorage.getItem('site_theme') !== 'light';
                var root = document.documentElement;
                root.classList.toggle('dark-theme', isDark);
                root.style.colorScheme = isDark ? 'dark' : 'light';
                root.style.backgroundColor = isDark ? '#08101d' : '#ffffff';
            } catch (_) {}
        })();
    </script>
    <meta charset="UTF-8">

    <style>
        :root {
            --session-zoom: 0.8;
        }

        html {
            zoom: var(--session-zoom);
            overflow: hidden;
        }

        body.h-screen {
            width: calc(100vw / var(--session-zoom));
            height: calc(100vh / var(--session-zoom));
        }

        @supports not (zoom: 1) {
            body.h-screen {
                transform: scale(var(--session-zoom));
                transform-origin: top left;
                width: calc(100% / var(--session-zoom));
                height: calc(100% / var(--session-zoom));
            }
        }

        .chat-sidebar {
            width: 280px;
            background: var(--bg-secondary);
            border-right: 1px solid var(--border);
            transition: width 0.25s ease;
            overflow-y: auto;
            overflow-x: hidden;
            display: flex;
            flex-direction: column;
        }
        .chat-sidebar.collapsed { width: 76px !important; }
        .chat-sidebar-toggle {
            width: 26px;
            height: 26px;
            border-radius: 8px;
            border: 1px solid var(--border);
            color: var(--text-tertiary);
            background: transparent;
            transition: all 0.2s ease;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            font-size: 12px;
        }
        .chat-sidebar-toggle:hover {
            color: var(--text-primary);
            border-color: var(--border-light);
            background: var(--bg-tertiary);
        }
        .chat-sidebar.collapsed .sidebar-collapse-hide { display: none !important; }
        .chat-sidebar.collapsed .chat-sidebar-menu-btn { justify-content: center; padding: 8px; }
        .chat-sidebar-menu-btn {
            display: flex;
            width: 100%;
            align-items: center;
            justify-content: flex-start;
            gap: 10px;
            padding: 8px 12px;
            border-radius: 10px;
            font-size: 0.875rem;
            font-weight: 500;
            color: var(--text-secondary);
            text-align: left;
            transition: all 0.2s ease;
            border: 1px solid transparent;
        }
        .chat-sidebar-menu-btn svg {
            width: 18px;
            height: 18px;
            stroke-width: 1.7;
            stroke-linecap: round;
            stroke-linejoin: round;
            fill: none;
            flex-shrink: 0;
        }
        .chat-sidebar-menu-btn:hover {
            background: var(--bg-tertiary);
            color: var(--text-primary);
        }
        .chat-sidebar-menu-btn.active {
            background: var(--accent-subtle);
            color: var(--accent-hover);
            border: 1px solid rgba(16, 185, 129, 0.35);
        }
        .chat-sidebar-card {
            background: var(--bg-tertiary);
            border: 1px solid var(--border);
            border-radius: 12px;
        }
        .sidebar-session-item {
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 10px;
            width: 100%;
            min-height: 36px;
            padding: 8px 10px;
            border-radius: 10px;
            background: transparent;
            border: 0;
            transition: all 0.2s ease;
            cursor: pointer;
            font-size: 0.875rem;
            color: #475569;
            font-weight: 600;
            text-align: left;
        }
        .sidebar-session-item:hover {
            background: #f1f5f9;
            color: #0f172a;
        }
        .sidebar-session-item.active {
            background: rgba(16, 185, 129, 0.2);
            color: #047857;
            border: 1px solid rgba(16, 185, 129, 0.45);
            box-shadow: 0 8px 20px rgba(16, 185, 129, 0.18);
        }
        .sidebar-session-item .session-title {
            font-size: 0.95rem;
            line-height: 1.2;
        }
        .sidebar-session-item .session-meta {
            margin-top: 2px;
            font-size: 0.75rem;
            color: #94a3b8;
            font-weight: 500;
        }
        .sidebar-session-item .session-chevron {
            color: #cbd5e1;
            transition: color 0.2s ease;
        }
        .sidebar-session-item:hover .session-chevron {
            color: #94a3b8;
        }
        /* AGENT WORKSPACE DARK MODE */
        body.dark-theme.agent-workspace-page {
            background:
                radial-gradient(circle at 18% 12%, rgba(16, 185, 129, 0.12), transparent 30%),
                linear-gradient(180deg, #08101d 0%, #0b1220 58%, #101827 100%) !important;
            color: #f8fafc !important;
        }
        body.dark-theme.agent-workspace-page > .flex-1,
        body.dark-theme.agent-workspace-page main,
        body.dark-theme.agent-workspace-page .min-h-screen.flex-1,
        body.dark-theme.agent-workspace-page .flex-1.flex.flex-col {
            background: transparent !important;
            color: #f8fafc !important;
        }
        body.dark-theme.agent-workspace-page .chat-sidebar {
            background: #0b1220 !important;
            border-right-color: #243247 !important;
            box-shadow: 16px 0 42px rgba(2, 6, 23, 0.45) !important;
        }
        body.dark-theme.agent-workspace-page .chat-sidebar [class*="border-slate-"] {
            border-color: #243247 !important;
        }
        body.dark-theme.agent-workspace-page .chat-sidebar-menu-btn {
            color: #d5deea !important;
        }
        body.dark-theme.agent-workspace-page .chat-sidebar-menu-btn:hover,
        body.dark-theme.agent-workspace-page .chat-sidebar-card:hover,
        body.dark-theme.agent-workspace-page .sidebar-session-item:hover {
            background: rgba(148, 163, 184, 0.14) !important;
            color: #f8fafc !important;
        }
        body.dark-theme.agent-workspace-page .chat-sidebar-menu-btn.active,
        body.dark-theme.agent-workspace-page .sidebar-session-item.active {
            background: linear-gradient(135deg, #059669, #10b981) !important;
            color: #ffffff !important;
            border-color: transparent !important;
            box-shadow: 0 14px 30px rgba(16, 185, 129, 0.28) !important;
        }
        body.dark-theme.agent-workspace-page .chat-sidebar-card,
        body.dark-theme.agent-workspace-page .bg-white,
        body.dark-theme.agent-workspace-page section.bg-white,
        body.dark-theme.agent-workspace-page #searchModalContent,
        body.dark-theme.agent-workspace-page #drivePickerContent {
            background: rgba(15, 23, 42, 0.82) !important;
            border-color: #334155 !important;
            box-shadow: 0 18px 42px rgba(2, 6, 23, 0.42) !important;
        }
        body.dark-theme.agent-workspace-page .bg-slate-50,
        body.dark-theme.agent-workspace-page .bg-slate-100 {
            background: rgba(30, 41, 59, 0.72) !important;
        }
        body.dark-theme.agent-workspace-page .text-slate-900,
        body.dark-theme.agent-workspace-page .text-slate-800,
        body.dark-theme.agent-workspace-page h1,
        body.dark-theme.agent-workspace-page h2,
        body.dark-theme.agent-workspace-page h3 {
            color: #f8fafc !important;
        }
        body.dark-theme.agent-workspace-page .text-slate-700,
        body.dark-theme.agent-workspace-page .text-slate-600 {
            color: #d5deea !important;
        }
        body.dark-theme.agent-workspace-page .text-slate-500,
        body.dark-theme.agent-workspace-page .text-slate-400 {
            color: #9db0c8 !important;
        }
        body.dark-theme.agent-workspace-page .border-slate-100,
        body.dark-theme.agent-workspace-page .border-slate-200,
        body.dark-theme.agent-workspace-page .border-slate-300 {
            border-color: #334155 !important;
        }
        body.dark-theme.agent-workspace-page input,
        body.dark-theme.agent-workspace-page select,
        body.dark-theme.agent-workspace-page textarea {
            background: rgba(15, 23, 42, 0.68) !important;
            border-color: #475569 !important;
            color: #f8fafc !important;
        }
        body.dark-theme.agent-workspace-page input::placeholder,
        body.dark-theme.agent-workspace-page textarea::placeholder {
            color: #94a3b8 !important;
        }
    </style>
</head>

    <script>
        const token = localStorage.getItem('token');
        if (!token) window.location.href = 'login.html';
        const user = JSON.parse(localStorage.getItem('user') || 'null');

        const params = new URLSearchParams(window.location.search);
        const avatarId = String(params.get('avatar_id') || '').trim();
        const sessionId = String(params.get('session') || '').trim();
        const addDocumentBtn = document.getElementById('addDocumentBtn');
        const addDocumentMenu = document.getElementById('addDocumentMenu');
        const uploadFromMachineBtn = document.getElementById('uploadFromMachineBtn');
        const uploadFromDriveBtn = document.getElementById('uploadFromDriveBtn');
        const machineFileInput = document.getElementById('machineFileInput');
        const uploadStatus = document.getElementById('uploadStatus');
        const drivePickerModal = document.getElementById('drivePickerModal');
        const drivePickerContent = document.getElementById('drivePickerContent');
        const driveFilesList = document.getElementById('driveFilesList');
        const drivePickerStatus = document.getElementById('drivePickerStatus');
        const driveSearchInput = document.getElementById('driveSearchInput');
        const driveSearchBtn = document.getElementById('driveSearchBtn');
        const driveTabRecent = document.getElementById('driveTabRecent');
        const driveTabMyDrive = document.getElementById('driveTabMyDrive');
        const driveUpBtn = document.getElementById('driveUpBtn');
        const driveBreadcrumb = document.getElementById('driveBreadcrumb');
        let driveViewMode = 'recent';
        const drivePath = [{ id: '', name: 'Mon Drive' }];

        function goBackToSessionOrDashboard() {
            if (sessionId) {
                const target = `/session?session=${encodeURIComponent(sessionId)}`;
                try {
                    const topWindow = window.top || window;
                    topWindow.location.href = target;
                } catch (_) {
                    window.location.href = target;
                }
                return;
            }
            try {
                const topWindow = window.top || window;
                topWindow.location.href = '/dashboard';
            } catch (_) {
                window.location.href = '/dashboard';
            }
        }

        const railUserInitial = document.getElementById('railUserInitial');
        const railUserName = document.getElementById('railUserName');
        const railUserMeta = document.getElementById('railUserMeta');

        let cachedSidebarSessions = [];

        document.addEventListener('DOMContentLoaded', function () {
            const sidebar = document.getElementById('chatSidebar');
            const toggleBtn = document.getElementById('chatSidebarToggle');
            if (sidebar && toggleBtn) {
                toggleBtn.addEventListener('click', function (e) {
                    e.stopPropagation();
                    sidebar.classList.toggle('collapsed');
                });
            }
            const searchInput = document.getElementById('sidebarSearch');
            if (searchInput) {
                searchInput.addEventListener('input', (e) => renderSearchResults(e.target.value));

            });

        function escapeHtml(str) {
            return String(str ?? '')
                .replaceAll('&', '&amp;')
                .replaceAll('<', '&lt;')
                .replaceAll('>', '&gt;')
                .replaceAll('"', '&quot;')
                .replaceAll("'", '&#39;');
        }

        function summarizeSessionTitle(title) {
            const normalized = String(title || '').replace(/\s+/g, ' ').trim();
            if (!normalized) return '';
            if (normalized.length <= 72) return normalized;
            return `${normalized.slice(0, 69).trim()}...`;
        }

        function getSessionDisplayTitle(session) {
            const firstMessage = summarizeSessionTitle(session?.session_title);
            if (firstMessage) return firstMessage;
            return session?.persona || session?.nom_avatar || session?.medicament_nom || 'Discussion';
        }

        function formatSessionDate(rawDate) {
            if (!rawDate) return 'Date inconnue';
            const parsed = new Date(rawDate);
            if (Number.isNaN(parsed.getTime())) return 'Date inconnue';
            return parsed.toLocaleString('fr-FR', {
                day: '2-digit',
                month: 'short',
                hour: '2-digit',
                minute: '2-digit',
            });
        }

        function renderSidebarSessions(sessions) {
            const list = document.getElementById('sessionsList');
            if (!list) return;
            if (!sessions.length) {
                list.innerHTML = '<div class="text-center py-8 text-slate-400 text-xs">Aucune discussion.</div>';
                return;
            }

            list.innerHTML = sessions.map((session) => {
                const idStr = session?.id != null ? String(session.id).trim() : '';
                const safeId = idStr ? encodeURIComponent(idStr) : '';
                const title = escapeHtml(getSessionDisplayTitle(session));
                const dateLabel = escapeHtml(formatSessionDate(session?.date_debut || session?.created_at));
                return `
                    <button type="button" class="sidebar-session-item" ${safeId ? `onclick="window.location.href='session.html?session=${safeId}'"` : 'disabled'}>
                        <div class="min-w-0 flex-1 text-left">
                            <div class="session-title truncate">${title}</div>
                            <div class="session-meta truncate">${dateLabel}</div>
                        </div>
                        <span class="session-chevron" aria-hidden="true">&rsaquo;</span>
                    </button>
                `;
            }).join('');
        }

        async function loadSidebarSessions() {
            const list = document.getElementById('sessionsList');
            if (!list) return;
            list.innerHTML = '<div class="text-center py-8 text-slate-400 text-xs">Chargement...</div>';

            try {
                const res = await fetch('/api/sessions', {
                    headers: { Authorization: 'Bearer ' + token }
                });
                if (!res.ok) throw new Error(`HTTP ${res.status}`);
                const payload = await res.json();
                const sessions = Array.isArray(payload) ? payload : [];
                cachedSidebarSessions = sessions;
                renderSidebarSessions(sessions.slice(0, 8));
            } catch (_) {
                list.innerHTML = '<div class="text-center py-8 text-red-400 text-xs">Erreur de chargement.</div>';
            }
        }

        function renderSearchResults(query) {
            const out = document.getElementById('modalSearchResults');
            if (!out) return;
            const q = String(query || '').trim().toLowerCase();
            if (!q) {
                out.innerHTML = '<div class="text-center py-12 text-slate-400 text-sm">Tapez pour rechercher...</div>';
                return;
            }
            const results = cachedSidebarSessions.filter((s) => {
                const hay = `${getSessionDisplayTitle(s)} ${s?.persona || ''} ${s?.nom_avatar || ''}`.toLowerCase();
                return hay.includes(q);
            }).slice(0, 20);
            if (!results.length) {
                out.innerHTML = '<div class="text-center py-12 text-slate-400 text-sm">Aucun résultat.</div>';
                return;
            }
            out.innerHTML = results.map((session) => {
                const idStr = session?.id != null ? String(session.id).trim() : '';
                const safeId = idStr ? encodeURIComponent(idStr) : '';
                const title = escapeHtml(getSessionDisplayTitle(session));
                const dateLabel = escapeHtml(formatSessionDate(session?.date_debut || session?.created_at));
                return `
                    <button type="button" class="sidebar-session-item mx-3 my-1" ${safeId ? `onclick="window.location.href='session.html?session=${safeId}'"` : 'disabled'}>
                        <div class="min-w-0 flex-1 text-left">
                            <div class="session-title truncate">${title}</div>
                            <div class="session-meta truncate">${dateLabel}</div>
                        </div>
                        <span class="session-chevron" aria-hidden="true">&rsaquo;</span>
                    </button>
                `;
            }).join('');
        }

        function toggleSearchModal(event) {
            const modal = document.getElementById('searchModal');
            const content = document.getElementById('searchModalContent');
            const input = document.getElementById('sidebarSearch');
            if (!modal || !content) return;
            const isHidden = modal.classList.contains('hidden');
            if (isHidden) {
                modal.classList.remove('hidden');
                setTimeout(() => {
                    modal.classList.remove('opacity-0', 'pointer-events-none');
                    content.classList.remove('scale-95', 'opacity-0');
                    if (input) {
                        input.value = '';
                        input.focus();
                    }
                    renderSearchResults('');
                }, 10);
                return;
            }
            modal.classList.add('opacity-0', 'pointer-events-none');
            content.classList.add('scale-95', 'opacity-0');
            setTimeout(() => modal.classList.add('hidden'), 300);
        }

        function setDocCount(count) {
            const badge = document.getElementById('docCountBadge');
            if (!badge) return;
            badge.textContent = `${count} document${count > 1 ? 's' : ''}`;
        }

        function setUploadStatus(message, tone = 'muted') {
            if (!uploadStatus) return;
            uploadStatus.textContent = message || '';
            if (!message) {
                uploadStatus.className = 'text-xs font-medium mb-3';
                return;
            }
            if (tone === 'success') {
                uploadStatus.className = 'text-xs font-medium text-emerald-600 mb-3';
                return;
            }
            if (tone === 'error') {
                uploadStatus.className = 'text-xs font-medium text-red-500 mb-3';
                return;
            }
            uploadStatus.className = 'text-xs font-medium text-slate-500 mb-3';
        }

        function renderDocs(docs) {
            const list = document.getElementById('docsList');
            if (!list) return;
            if (!avatarId) {
                setDocCount(0);
                list.innerHTML = '<p class="text-slate-400 italic">Aucun agent sélectionné depuis la session.</p>';
                return;
            }
            if (!docs.length) {
                setDocCount(0);
                list.innerHTML = '<p class="text-slate-400 italic">Aucun document RAG pour cet agent.</p>';
                return;
            }
            setDocCount(docs.length);
            list.innerHTML = docs.map((d) => `
                <div class="rounded-xl border border-slate-200 bg-slate-50 p-4 flex items-start justify-between gap-4 min-w-0">
                    <div class="min-w-0 flex-1">
                        <p class="font-semibold text-slate-800 break-all leading-snug">${d.name || d.filename || 'Document'}</p>
                        <p class="text-xs text-slate-500 mt-1 break-words">Chunks: ${Number(d.chunk_count || 0)}</p>
                    </div>
                    <div class="flex items-center gap-3 shrink-0">
                        <span class="text-[10px] uppercase tracking-widest text-slate-400">RAG</span>
                        <button type="button" class="inline-flex items-center rounded-full border border-red-200 bg-white px-3 py-1 text-xs font-semibold text-red-600 hover:bg-red-50 transition" onclick="deleteDoc('${String((d.uuid || d.id || '')).replace(/'/g, "\\'")}')">
                            Supprimer
                        </button>
                    </div>
                </div>
            `).join('');
        }

        async function deleteDoc(docId) {
            const id = String(docId || '').trim();
            if (!id) return;
            if (!confirm('Supprimer ce document ?')) return;
            try {
                const res = await fetch('/api/admin/rag/documents/' + encodeURIComponent(id), {
                    method: 'DELETE',
                    headers: { Authorization: 'Bearer ' + token }
                });
                if (!res.ok) {
                    const payload = await res.json().catch(() => ({}));
                    throw new Error(payload?.error || 'Suppression impossible.');
                }
                setUploadStatus('Document supprimé.', 'success');
                await loadDocs();
            } catch (err) {
                setUploadStatus(err?.message || 'Erreur lors de la suppression.', 'error');
            }
        }

        async function loadAgentName() {
            if (!avatarId) return;
            try {
                const res = await fetch('/api/admin/avatars', {
                    headers: { Authorization: 'Bearer ' + token }
                });
                const avatars = await res.json();
                const agent = (Array.isArray(avatars) ? avatars : []).find(a => String(a.id) === avatarId);
                if (!agent) return;
                const subtitle = document.getElementById('agentSubtitle');
                if (subtitle) {
                    subtitle.textContent = `${agent.icone || '🧠'} ${agent.nom_avatar} — documents liés`;
                }
            } catch (_) { }
        }

        async function loadDocs() {
            try {
                const res = await fetch('/api/admin/rag/documents', {
                    headers: { Authorization: 'Bearer ' + token }
                });
                const payload = await res.json();
                const docs = Array.isArray(payload?.documents) ? payload.documents : [];
                const filtered = avatarId ? docs.filter(d => String(d.avatar_id) === avatarId) : [];
                renderDocs(filtered);
            } catch (e) {
                const list = document.getElementById('docsList');
                if (list) list.innerHTML = '<p class="text-red-500">Erreur de chargement des documents.</p>';
            }
        }

        async function startGoogleDriveOAuth() {
            try {
                setUploadStatus('Connexion à Google Drive...', 'muted');
                const returnTo = `${window.location.pathname}${window.location.search || ''}`;
                const res = await fetch(`/api/oauth/connectors/start/google_documents?return_to=${encodeURIComponent(returnTo)}`, {
                    headers: { Authorization: 'Bearer ' + token }
                });
                const data = await res.json();
                if (!res.ok || !data?.url) {
                    const message = data?.error || 'Impossible de lancer Google Drive.';
                    throw new Error(message);
                }
                (window.top || window).location.href = data.url;
            } catch (err) {
                setUploadStatus(err?.message || 'Erreur Google Drive.', 'error');
            }
        }

        function closeDrivePicker() {
            if (!drivePickerModal || !drivePickerContent) return;
            drivePickerModal.classList.add('opacity-0', 'pointer-events-none');
            drivePickerContent.classList.add('scale-95', 'opacity-0');
            setTimeout(() => drivePickerModal.classList.add('hidden'), 250);
        }

        function openDrivePicker() {
            if (!drivePickerModal || !drivePickerContent) return;
            drivePickerModal.classList.remove('hidden');
            requestAnimationFrame(() => {
                drivePickerModal.classList.remove('opacity-0', 'pointer-events-none');
                drivePickerContent.classList.remove('scale-95', 'opacity-0');
                loadDriveFiles('');
            });
        }

        async function loadDriveFiles(query) {
            if (!driveFilesList) return;
            driveFilesList.innerHTML = '<div class="text-center py-10 text-slate-400 text-sm">Chargement...</div>';
            if (drivePickerStatus) drivePickerStatus.textContent = '';
            try {
                const params = new URLSearchParams();
                if (query) params.set('q', query);
                params.set('mode', driveViewMode);
                const currentFolderId = drivePath[drivePath.length - 1]?.id || '';
                if (driveViewMode === 'drive' && currentFolderId) params.set('parent_id', currentFolderId);
                const res = await fetch(`/api/oauth/connectors/google-documents/files?${params.toString()}`, {
                    headers: { Authorization: 'Bearer ' + token }
                });
                const payload = await res.json().catch(() => ({}));
                if (!res.ok) {
                    const msg = payload?.detail ? `${payload?.error || 'Erreur Drive'}: ${payload.detail}` : (payload?.error || 'Impossible de charger Drive.');
                    throw new Error(msg);
                }
                const files = Array.isArray(payload.files) ? payload.files : [];
                const folders = files.filter((f) => String(f.mimeType || '') === 'application/vnd.google-apps.folder');
                const regularFiles = files.filter((f) => String(f.mimeType || '') !== 'application/vnd.google-apps.folder');
                if (!files.length) {
                    driveFilesList.innerHTML = '<div class="text-center py-10 text-slate-400 text-sm">Aucun fichier trouvé.</div>';
                    return;
                }
                const folderHtml = folders.map((f) => {
                    const id = String(f.id || '');
                    const name = String(f.name || 'Dossier');
                    return `
                        <button type="button" class="w-full text-left rounded-xl border border-slate-200 hover:border-slate-300 px-4 py-3 flex items-center justify-between gap-3" onclick="openDriveFolder('${id.replace(/'/g, "\\'")}', '${name.replace(/'/g, "\\'")}')">
                            <div class="min-w-0">
                                <p class="font-semibold text-slate-800 truncate">📁 ${name}</p>
                                <p class="text-xs text-slate-500 truncate">Dossier</p>
                            </div>
                            <span class="text-xs font-semibold text-slate-600">Ouvrir</span>
                        </button>
                    `;
                }).join('');
                const fileHtml = regularFiles.map((f) => {
                    const id = String(f.id || '');
                    const name = String(f.name || 'Fichier');
                    const mime = String(f.mimeType || '');
                    const isGoogleWorkspace = mime.startsWith('application/vnd.google-apps.');
                    const blockedByPermissions = !isGoogleWorkspace && f?.capabilities?.canDownload === false;
                    const importAction = blockedByPermissions
                        ? ''
                        : `onclick="importDriveFile('${id.replace(/'/g, "\\'")}', '${name.replace(/'/g, "\\'")}')"`;
                    const importLabel = blockedByPermissions ? 'Bloqué' : 'Importer';
                    const importClass = blockedByPermissions
                        ? 'text-xs font-semibold text-slate-400'
                        : 'text-xs font-semibold text-emerald-700';
                    const disabledAttr = blockedByPermissions ? 'disabled title="Fichier non téléchargeable avec ce compte"' : '';
                    const note = blockedByPermissions
                        ? '<p class="text-[11px] text-amber-600 truncate">Droits insuffisants pour ce fichier</p>'
                        : '';
                    return `
                        <button type="button" class="w-full text-left rounded-xl border border-slate-200 hover:border-slate-300 px-4 py-3 flex items-center justify-between gap-3 ${blockedByPermissions ? 'opacity-70 cursor-not-allowed' : ''}" ${importAction} ${disabledAttr}>
                            <div class="min-w-0">
                                <p class="font-semibold text-slate-800 truncate">${name}</p>
                                <p class="text-xs text-slate-500 truncate">${mime}</p>
                                ${note}
                            </div>
                            <span class="${importClass}">${importLabel}</span>
                        </button>
                    `;
                }).join('');
                driveFilesList.innerHTML = folderHtml + fileHtml;
                if (drivePickerStatus) {
                    const pathLabel = drivePath.map((x) => x.name).join(' / ');
                    drivePickerStatus.textContent = driveViewMode === 'drive'
                        ? pathLabel
                        : 'Récents';
                }
                if (driveUpBtn) {
                    const canGoUp = driveViewMode === 'drive' && drivePath.length > 1;
                    driveUpBtn.classList.toggle('hidden', !canGoUp);
                }
                renderDriveBreadcrumb();
            } catch (err) {
                driveFilesList.innerHTML = '<div class="text-center py-10 text-red-400 text-sm">Erreur de chargement Google Drive.</div>';
                if (drivePickerStatus) drivePickerStatus.textContent = err?.message || 'Erreur Drive.';
            }
        }

        function renderDriveBreadcrumb() {
            if (!driveBreadcrumb) return;
            if (driveViewMode !== 'drive') {
                driveBreadcrumb.classList.add('hidden');
                driveBreadcrumb.innerHTML = '';
                return;
            }
            driveBreadcrumb.classList.remove('hidden');
            driveBreadcrumb.innerHTML = drivePath.map((node, idx) => {
                const isLast = idx === drivePath.length - 1;
                const safeName = escapeHtml(node.name || 'Dossier');
                if (isLast) return `<span class="font-semibold text-slate-700">${safeName}</span>`;
                return `<button type="button" class="hover:underline text-slate-600" onclick="jumpToDriveLevel(${idx})">${safeName}</button><span class="text-slate-300">/</span>`;
            }).join('');
        }

        function activateDriveTabs() {
            if (driveTabRecent) {
                const isRecent = driveViewMode === 'recent';
                driveTabRecent.className = isRecent
                    ? 'px-3 py-1.5 rounded-full text-xs font-semibold bg-slate-900 text-white'
                    : 'px-3 py-1.5 rounded-full text-xs font-semibold border border-slate-300 text-slate-700';
            }
            if (driveTabMyDrive) {
                const isDrive = driveViewMode === 'drive';
                driveTabMyDrive.className = isDrive
                    ? 'px-3 py-1.5 rounded-full text-xs font-semibold bg-slate-900 text-white'
                    : 'px-3 py-1.5 rounded-full text-xs font-semibold border border-slate-300 text-slate-700';
            }
        }

        function openDriveFolder(folderId, folderName) {
            if (!folderId) return;
            drivePath.push({ id: folderId, name: folderName || 'Dossier' });
            driveViewMode = 'drive';
            activateDriveTabs();
            loadDriveFiles(String(driveSearchInput?.value || '').trim());
        }

        function goDriveParent() {
            if (drivePath.length > 1) drivePath.pop();
            driveViewMode = 'drive';
            activateDriveTabs();
            loadDriveFiles(String(driveSearchInput?.value || '').trim());
        }

        function jumpToDriveLevel(levelIndex) {
            const idx = Number(levelIndex);
            if (!Number.isFinite(idx)) return;
            if (idx < 0 || idx >= drivePath.length) return;
            drivePath.splice(idx + 1);
            driveViewMode = 'drive';
            activateDriveTabs();
            loadDriveFiles(String(driveSearchInput?.value || '').trim());
        }

        async function ensureGoogleDriveConnected() {
            try {
                const res = await fetch('/api/oauth/connectors/status', {
                    headers: { Authorization: 'Bearer ' + token }
                });
                const payload = await res.json().catch(() => ({}));
                const connected = Array.isArray(payload?.connections)
                    ? payload.connections.some((c) => c.provider === 'google_documents')
                    : false;
                if (connected) return true;
            } catch (_) {}
            return false;
        }

        async function importDriveFile(fileId, fileName) {
            try {
                setUploadStatus(`Import depuis Drive: ${fileName}...`, 'muted');
                const res = await fetch('/api/oauth/connectors/google-documents/import', {
                    method: 'POST',
                    headers: {
                        Authorization: 'Bearer ' + token,
                        'Content-Type': 'application/json',
                    },
                    body: JSON.stringify({
                        avatar_id: avatarId ? Number(avatarId) : null,
                        session_id: sessionId || null,
                        file_id: fileId,
                        file_name: fileName,
                    }),
                });
                const payload = await res.json().catch(() => ({}));
                if (!res.ok) {
                    const msg = payload?.detail ? `${payload?.error || 'Import Google Drive échoué'}: ${payload.detail}` : (payload?.error || 'Import Google Drive échoué.');
                    throw new Error(msg);
                }
                setUploadStatus('Fichier Drive importé avec succès.', 'success');
                closeDrivePicker();
                await loadDocs();
            } catch (err) {
                setUploadStatus(err?.message || 'Erreur import Drive.', 'error');
            }
        }

        async function uploadLocalFiles(files) {
            if (!avatarId) {
                setUploadStatus('Agent introuvable dans cette session.', 'error');
                return;
            }
            if (!files?.length) return;

            setUploadStatus('Téléchargement et vectorisation en cours...', 'muted');
            try {
                for (const file of files) {
                    const form = new FormData();
                    form.append('file', file);
                    form.append('avatar_id', avatarId);
                    const ext = String(file.name || '').split('.').pop().toLowerCase();
                    const url = (ext === 'xlsx' || ext === 'xls') ? '/api/admin/excel/upload' : '/api/admin/rag/upload';
                    const res = await fetch(url, {
                        method: 'POST',
                        headers: { Authorization: 'Bearer ' + token },
                        body: form,
                    });
                    if (!res.ok) {
                        const payload = await res.json().catch(() => null);
                        throw new Error(payload?.error || `Échec upload: ${file.name}`);
                    }
                }
                setUploadStatus('Documents ajoutés avec succès.', 'success');
                await loadDocs();
            } catch (err) {
                setUploadStatus(err?.message || 'Erreur pendant l’ajout.', 'error');
            } finally {
                machineFileInput.value = '';
            }
        }

        addDocumentBtn?.addEventListener('click', () => {
            addDocumentMenu?.classList.toggle('hidden');
        });

        document.addEventListener('click', (event) => {
            if (!addDocumentMenu || !addDocumentBtn) return;
            const insideMenu = addDocumentMenu.contains(event.target);
            const onButton = addDocumentBtn.contains(event.target);
            if (!insideMenu && !onButton) addDocumentMenu.classList.add('hidden');

        uploadFromMachineBtn?.addEventListener('click', () => {

        uploadFromDriveBtn?.addEventListener('click', () => {

        driveSearchBtn?.addEventListener('click', () => loadDriveFiles(String(driveSearchInput?.value || '').trim()));
        driveSearchInput?.addEventListener('keydown', (e) => {
            if (e.key === 'Enter') loadDriveFiles(String(driveSearchInput?.value || '').trim());
        });
        driveTabRecent?.addEventListener('click', () => {
            driveViewMode = 'recent';
            drivePath.splice(1);
            activateDriveTabs();
            loadDriveFiles(String(driveSearchInput?.value || '').trim());
        });
        driveTabMyDrive?.addEventListener('click', () => {

            drivePath.splice(1);
            activateDriveTabs();
            loadDriveFiles(String(driveSearchInput?.value || '').trim());

        driveUpBtn?.addEventListener('click', goDriveParent);

        machineFileInput?.addEventListener('change', () => {
            const files = Array.from(machineFileInput.files || []);
            uploadLocalFiles(files);
        });

        loadAgentName();
        loadDocs();

        (function handleOauthReturnForDrive() {
            const p = new URLSearchParams(window.location.search);
            const ok = p.get('oauth_ok') === '1';
            const provider = (p.get('oauth_provider') || '').toLowerCase();
            const drivePick = p.get('drive_pick') === '1';
            if (ok && provider === 'google_documents') {
                setUploadStatus('Connexion Google Drive enregistrée.', 'success');
            }
            if (ok && provider === 'google_documents' && drivePick) {
                driveViewMode = 'recent';
                drivePath.splice(1);
                activateDriveTabs();
                openDrivePicker();
            }
            if (p.get('oauth_ok') || p.get('oauth_error') || p.get('oauth_provider') || p.get('drive_pick')) {
                p.delete('oauth_ok');
                p.delete('oauth_error');
                p.delete('oauth_provider');
                p.delete('drive_pick');
                const next = p.toString();
                history.replaceState(null, '', `agent-knowledge.html${next ? '?' + next : ''}`);
            }
        })();
    </script>
    <script src="theme-toggle.js"></script>
</body>
</html>
